x-app-environment: &app-environment
  APP_NAME: Galala IAAS
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:-https://api.galalabot.app}

  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: iaas_db
  DB_USERNAME: iaas_user
  DB_PASSWORD: ${DB_PASSWORD:-iaas_password}

  SESSION_DRIVER: database
  SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis

  SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1

  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set and non-empty}
  REDIS_PORT: 6379

  AI_CHAT_DRIVER: ${AI_CHAT_DRIVER:-http}
  AI_SERVICE_URL: ${AI_SERVICE_URL:?AI_SERVICE_URL must be set}
  AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:?AI_SERVICE_TOKEN must be set and non-empty}
  AI_CHAT_PATH: ${AI_CHAT_PATH:-/api/chat}
  AI_CHAT_SUMMARIZE_PATH: ${AI_CHAT_SUMMARIZE_PATH:-/api/chat/summarize}
  AI_CONNECT_TIMEOUT_SECONDS: ${AI_CONNECT_TIMEOUT_SECONDS:-10}
  AI_RESPONSE_TIMEOUT_SECONDS: ${AI_RESPONSE_TIMEOUT_SECONDS:-420}
  CHAT_MAX_MESSAGE_LENGTH: ${CHAT_MAX_MESSAGE_LENGTH:-3000}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galala_iaas_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - galala_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "false"
    entrypoint: []
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --queue=ai-chat
      - --tries=1
      - --timeout=460
      - --sleep=3
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - galala_network


  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "false"
    entrypoint: []
    command:
      - php
      - artisan
      - schedule:work
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - galala_network

  nginx:
    image: nginx:alpine
    container_name: galala_iaas_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - galala_network

  mysql:
    image: mysql:8.0
    container_name: galala_iaas_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: iaas_db
      MYSQL_USER: iaas_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-iaas_password}
    volumes:
      - galala_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - galala_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set and non-empty}
      - --appendonly
      - "yes"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set and non-empty}
    volumes:
      - galala_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - galala_network

volumes:
  galala_mysql_data:
    driver: local
  galala_redis_data:
    driver: local

networks:
  galala_network:
    driver: bridge
